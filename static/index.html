<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Scraper Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ── Variables & Reset ──────────────────────── */
    :root {
      --bg-dark: #050810;
      --panel-bg: rgba(16, 22, 40, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-primary: #8b5cf6;
      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
      --text-main: #f1f5f9;
      --text-dim: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      --font-main: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Outfit', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-main);
      background: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 40px;
    }

    /* ── Layout ───────────────────────────────── */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Glass Effect ─────────────────────────── */
    .glass {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: var(--card-shadow);
    }

    /* ── Header ───────────────────────────────── */
    .header {
      padding: 40px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeInDown 0.8s ease-out;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand h1 {
      font-family: var(--font-display);
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand p {
      color: var(--text-dim);
      font-size: 14px;
      margin-top: 6px;
      font-weight: 500;
    }

    /* ── Dashboard Grid ───────────────────────── */
    .grid-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      border-color: rgba(139, 92, 246, 0.4);
      background: rgba(16, 22, 40, 0.9);
    }

    .stat-card .label {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    .stat-card .value {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
    }

    .stat-card .trend {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Charts & Visuals ─────────────────────── */
    .visuals-row {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 24px;
      margin-bottom: 30px;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    .viz-panel {
      padding: 24px;
      min-height: 300px;
    }

    .viz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .viz-header h2 {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
    }

    /* ── Controls & Filter ────────────────────── */
    .toolbar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .input-grp {
      flex: 1;
      position: relative;
    }

    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 20px 14px 48px;
      color: white;
      font-family: var(--font-main);
      font-size: 14px;
      transition: all 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
    }

    .select-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 0 16px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      min-width: 160px;
      outline: none;
    }

    /* ── Table Styling ────────────────────────── */
    .table-panel {
      padding: 0;
      overflow: hidden;
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }

    .table-wrapper {
      max-height: 600px;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #131829;
      padding: 16px 24px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      border-bottom: 2px solid var(--glass-border);
      z-index: 10;
      cursor: pointer;
    }

    tbody td {
      padding: 18px 24px;
      font-size: 14px;
      border-bottom: 1px solid var(--glass-border);
      transition: background 0.2s;
    }

    tbody tr:hover td {
      background: rgba(255, 255, 255, 0.03);
    }

    .job-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .job-title {
      font-weight: 600;
      color: var(--text-main);
      font-size: 15px;
    }

    .job-meta {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      gap: 8px;
    }

    /* ── Badges ───────────────────────────────── */
    .badge {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .score-high { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .score-med  { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .score-low  { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

    .btn-apply {
      display: inline-block;
      padding: 8px 16px;
      background: var(--accent-gradient);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.3s;
    }

    .btn-apply:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
    }

    /* ── Custom Scrollbar ─────────────────────── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    ::-webkit-scrollbar-thumb { 
      background: rgba(255,255,255,0.1); 
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* ── Loading Overlay ──────────────────────── */
    .loader {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-dark);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s;
    }
    .loader.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div class="loader" id="loader">
    <div style="width:50px; height:50px; border:4px solid var(--accent-primary); border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite;"></div>
  </div>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <h1>🕷️ Job Scraper</h1>
        <p>Advanced Real-time Portfolio Monitoring & AI Analysis</p>
      </div>
      <div class="status-pill glass" style="padding: 10px 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px;">
        <span style="width:8px; height:8px; background:var(--success); border-radius:50%; box-shadow: 0 0 10px var(--success);"></span>
        System Active
      </div>
    </header>

    <!-- Stats Grid -->
    <div class="grid-stats" id="stats-grid">
      <div class="stat-card glass"><div class="label">Loading...</div></div>
    </div>

    <!-- Visuals Row -->
    <div class="visuals-row">
      <div class="viz-panel glass">
        <div class="viz-header"><h2>Jobs per Company</h2></div>
        <canvas id="companyChart" height="200"></canvas>
      </div>
      <div class="viz-panel glass">
        <div class="viz-header"><h2>Score Distribution</h2></div>
        <canvas id="scoreChart" height="200"></canvas>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="input-grp">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchBox" class="search-input" placeholder="Search keywords, positions, companies..." />
      </div>
      <select id="companyFilter" class="select-input glass">
        <option value="">All Companies</option>
      </select>
      <select id="scoreFilter" class="select-input glass">
        <option value="">All Matches</option>
        <option value="90">90%+ Elite</option>
        <option value="80">80%+ High Match</option>
        <option value="50">50%+ Medium</option>
      </select>
    </div>

    <!-- Table Panel -->
    <div class="table-panel glass">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th onclick="sortData('title')">Position & Company</th>
              <th onclick="sortData('location')">Location</th>
              <th onclick="sortData('match_score')">AI Score</th>
              <th>AI Analysis</th>
              <th onclick="sortData('first_seen')">Detected</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="jobTableBody">
            <!-- Data injected here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let appState = {
      jobs: [],
      stats: {},
      sortBy: 'first_seen',
      sortDir: 'desc'
    };

    async function fetchData() {
      try {
        const [statsRes, jobsRes] = await Promise.all([
          fetch('/api/stats'),
          fetch('/api/jobs')
        ]);
        appState.stats = await statsRes.json();
        appState.jobs = await jobsRes.json();
        
        updateUI();
        document.getElementById('loader').classList.add('hidden');
      } catch (e) {
        console.error("Fetch failed", e);
      }
    }

    function updateUI() {
      renderStats();
      renderCharts();
      populateDropdowns();
      filterAndRenderTable();
    }

    function renderStats() {
      const g = document.getElementById('stats-grid');
      const s = appState.stats;
      g.innerHTML = `
        <div class="stat-card glass">
          <div class="label">Total Scraped</div>
          <div class="value">${s.total}</div>
        </div>
        <div class="stat-card glass">
          <div class="label">Elite Matches</div>
          <div class="value" style="color:var(--accent-primary)">${s.high_match}</div>
        </div>
        <div class="stat-card glass">
          <div class="label">Average Score</div>
          <div class="value" style="color:var(--warning)">${s.avg_score}%</div>
        </div>
        <div class="stat-card glass">
          <div class="label">Alerts Sent</div>
          <div class="value" style="color:var(--success)">${s.notified}</div>
        </div>
      `;
    }

    let charts = {};
    function renderCharts() {
      const ctx1 = document.getElementById('companyChart').getContext('2d');
      const ctx2 = document.getElementById('scoreChart').getContext('2d');
      
      if (charts.company) charts.company.destroy();
      if (charts.score) charts.score.destroy();

      const companies = appState.stats.company_breakdown || [];
      
      charts.company = new Chart(ctx1, {
        type: 'bar',
        data: {
          labels: companies.map(c => c.name),
          datasets: [{
            label: 'Jobs',
            data: companies.map(c => c.count),
            backgroundColor: 'rgba(139, 92, 246, 0.5)',
            borderColor: '#8b5cf6',
            borderWidth: 1,
            borderRadius: 5
          }]
        },
        options: {
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
            y: { grid: { display: false }, ticks: { color: '#94a3b8' } }
          }
        }
      });

      // Simple score histogram
      const scoreBuckets = [0, 20, 40, 60, 80, 101];
      const scoreCounts = new Array(scoreBuckets.length - 1).fill(0);
      appState.jobs.forEach(j => {
        const s = j.match_score || 0;
        for (let i = 0; i < scoreBuckets.length - 1; i++) {
          if (s >= scoreBuckets[i] && s < scoreBuckets[i+1]) {
            scoreCounts[i]++;
            break;
          }
        }
      });

      charts.score = new Chart(ctx2, {
        type: 'doughnut',
        data: {
          labels: ['0-20', '21-40', '41-60', '61-80', '81-100'],
          datasets: [{
            data: scoreCounts,
            backgroundColor: [
              'rgba(239, 68, 68, 0.4)',
              'rgba(249, 115, 22, 0.4)',
              'rgba(245, 158, 11, 0.4)',
              'rgba(59, 130, 246, 0.4)',
              'rgba(16, 185, 129, 0.4)'
            ],
            borderWidth: 0
          }]
        },
        options: {
          plugins: { 
            legend: { 
              position: 'right',
              labels: { color: '#94a3b8', font: { size: 10 } }
            } 
          },
          cutout: '70%'
        }
      });
    }

    function populateDropdowns() {
      const sel = document.getElementById('companyFilter');
      const companies = [...new Set(appState.jobs.map(j => j.company))].sort();
      sel.innerHTML = '<option value="">All Companies</option>' + 
        companies.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function sortData(key) {
      if (appState.sortBy === key) {
        appState.sortDir = appState.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        appState.sortBy = key;
        appState.sortDir = 'desc';
      }
      filterAndRenderTable();
    }

    function filterAndRenderTable() {
      const search = document.getElementById('searchBox').value.toLowerCase();
      const comp = document.getElementById('companyFilter').value;
      const score = document.getElementById('scoreFilter').value;

      let filtered = appState.jobs.filter(j => {
        const matchesSearch = `${j.title} ${j.company} ${j.description}`.toLowerCase().includes(search);
        const matchesComp = !comp || j.company === comp;
        const matchesScore = !score || (j.match_score >= parseInt(score));
        return matchesSearch && matchesComp && matchesScore;
      });

      filtered.sort((a, b) => {
        let v1 = a[appState.sortBy];
        let v2 = b[appState.sortBy];
        if (typeof v1 === 'string') v1 = v1.toLowerCase();
        if (typeof v2 === 'string') v2 = v2.toLowerCase();
        
        if (v1 < v2) return appState.sortDir === 'asc' ? -1 : 1;
        if (v1 > v2) return appState.sortDir === 'asc' ? 1 : -1;
        return 0;
      });

      const body = document.getElementById('jobTableBody');
      body.innerHTML = filtered.map(j => {
        const s = j.match_score || 0;
        const sClass = s >= 80 ? 'score-high' : s >= 50 ? 'score-med' : 'score-low';
        
        return `
          <tr>
            <td>
              <div class="job-info">
                <span class="job-title">${esc(j.title)}</span>
                <span class="job-meta">🏢 ${esc(j.company)}</span>
              </div>
            </td>
            <td><span class="job-meta">📍 ${esc(j.location)}</span></td>
            <td><span class="badge ${sClass}">${s}%</span></td>
            <td style="max-width:300px"><div style="font-size:12px; color:var(--text-dim); line-height:1.4">${esc(j.match_reasoning) || 'Analysis pending...'}</div></td>
            <td><span class="job-meta">🕒 ${formatDate(j.first_seen)}</span></td>
            <td><a href="${j.apply_link}" target="_blank" class="btn-apply">Explore</a></td>
          </tr>
        `;
      }).join('');
    }

    function esc(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }

    function formatDate(d) {
      if (!d) return 'N/A';
      const date = new Date(d);
      return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    document.getElementById('searchBox').addEventListener('input', filterAndRenderTable);
    document.getElementById('companyFilter').addEventListener('change', filterAndRenderTable);
    document.getElementById('scoreFilter').addEventListener('change', filterAndRenderTable);

    fetchData();
    setInterval(fetchData, 60000); // Auto refresh every minute
  </script>
</body>
</html>
